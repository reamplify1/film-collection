name: Angular Sprint 2 CI

on:
  push:
    branches: [ main, dev-sprint-2 ]
  pull_request:
    branches: [ main, dev-sprint-2 ]

jobs:
  build-and-lint:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install dependencies
      run: npm install --legacy-peer-deps

    - name: Run Linter
      run: npm run lint

    - name: Build Application
      run: npm run build
